services:
  - type: web
    name: flareguard-backend
    env: node
    region: oregon
    plan: starter          # $7/mo on Render — upgrade as you scale
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      # ── Set these in Render dashboard (secret) ──────────
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_SCOPES
        value: write_script_tags,read_script_tags
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FREE_REDIRECT_LIMIT
        value: "500"
